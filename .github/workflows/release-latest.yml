name: Release latest

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      base_version:
        description: Optional stable x.y.z base. Empty means auto patch from npm latest.
        required: false
        type: string

concurrency:
  group: release-latest
  cancel-in-progress: false

jobs:
  release:
    name: Publish latest
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'chore(release):')
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Check
        run: npm run check

      - name: Verify npm token
        shell: bash
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN repository secret is required before publishing."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Prepare version
        id: prepare
        shell: bash
        run: |
          args=(--channel stable)
          if [ -n "$BASE_VERSION" ]; then
            args+=(--base-version "$BASE_VERSION")
          fi
          node scripts/prepare-release.mjs "${args[@]}"
        env:
          BASE_VERSION: ${{ inputs.base_version || '' }}

      - name: Commit and tag
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.prepare.outputs.version }}"
          tag="${{ steps.prepare.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json
          if [ -f package-lock.json ]; then
            git add package-lock.json
          fi

          if ! git diff --cached --quiet; then
            git commit -m "chore(release): v${version}"
          fi

          head_sha="$(git rev-parse HEAD)"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            tag_sha="$(git rev-list -n 1 "${tag}")"
            if [ "$tag_sha" != "$head_sha" ]; then
              echo "::error::Tag ${tag} already points to ${tag_sha}, not ${head_sha}."
              exit 1
            fi
          else
            git tag "${tag}"
          fi

          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "${tag}"

      - name: Publish to npm
        run: npm publish --provenance --access public --tag "${{ steps.prepare.outputs.npm_tag }}" --registry=https://registry.npmjs.org/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
